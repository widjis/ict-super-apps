services:
  backend:
    build:
      context: ./backend
      target: dev
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      CORS_ORIGIN: "*"
    volumes:
      - ./backend:/app
      - /app/node_modules

  backend_prod:
    build:
      context: ./backend
      target: prod
    env_file:
      - ./backend/.env
    network_mode: host
    environment:
      PORT: "5058"
      CORS_ORIGIN: "*"
